name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: htms-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: htms-app/package-lock.json
      - run: npm ci
      # Gates run in order; a failing gate blocks the deploy.
      # Strict prod audit, but accept the one non-exploitable advisory: dompurify
      # (pulled by jsPDF) — we never invoke jsPDF's HTML/SVG sanitiser, only
      # text/table/image APIs. Any OTHER high/critical advisory still fails.
      - name: Dependency audit
        run: |
          npm audit --omit=dev --json > audit.json || true
          node -e "const a=require('./audit.json');const v=a.vulnerabilities||{};const ACCEPT=new Set(['dompurify','jspdf','jspdf-autotable']);const bad=Object.keys(v).filter(k=>['high','critical'].includes(v[k].severity)&&!ACCEPT.has(k));if(bad.length){console.error('Blocking high/critical advisories:',bad.join(', '));process.exit(1);}console.log('Audit OK — only the accepted dompurify/jsPDF chain is present (not exploitable in our usage).');"
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit + regression tests
        run: npm test
      - name: Migration naming guard
        run: |
          node -e "
          const fs=require('fs'),p=require('path');
          const dir='../supabase/migrations';
          const files=fs.readdirSync(dir).filter(f=>f.endsWith('.sql')).sort();
          const bad=[];
          for(let i=1;i<files.length;i++){
            const a=files[i-1].match(/^(\d+)/)?.[1]||'0000';
            const b=files[i].match(/^(\d+)/)?.[1]||'0000';
            if(b<a) bad.push(files[i]+' (prefix '+b+' < '+a+' from '+files[i-1]+')');
          }
          if(bad.length){console.error('Migration naming violations:');bad.forEach(b=>console.error('  '+b));process.exit(1);}
          console.log('Migration prefixes monotonic across '+files.length+' files.');
          "
      - name: Build (minified, no source maps)
        run: npm run build
